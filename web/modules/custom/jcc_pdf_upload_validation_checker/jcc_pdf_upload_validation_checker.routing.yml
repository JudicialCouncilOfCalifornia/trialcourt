jcc_pdf_upload_validation_checker.settings_form:
  path: '/admin/config/system/jcc-pdf-upload-validation-checker'
  defaults:
    _title: 'JCC PDF upload validation checker settings'
    _form: 'Drupal\jcc_pdf_upload_validation_checker\Form\SettingsForm'
  requirements:
    _permission: 'administer jcc_pdf_upload_validation_checker configuration'

jcc_pdf_upload_validation_checker.enqueue_by_fid:
  path: '/api/pdf-audit/{fid}/pending'
  defaults:
    _controller: '\Drupal\jcc_pdf_upload_validation_checker\Controller\PdfAuditEnqueueController::markPendingAndQueue'
  requirements:
    fid: '\d+'
    _csrf_request_header_token: 'TRUE'
  methods: [POST]
